name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: CLI smoke test
        run: node ./bin/vazr.js --help

      - name: CLI version smoke test
        run: node ./bin/vazr.js --version

      - name: CLI profile list smoke test
        run: node ./bin/vazr.js profile list

      - name: Security audit (prod deps only)
        run: npm audit --omit=dev --audit-level=high
